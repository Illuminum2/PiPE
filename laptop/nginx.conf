error_log stderr;
pid nginx.pid;

events {}

http {
    types {
        text/html html;
        application/javascript js;
        text/css css;
    }

    # https://www.thehackerwire.com/hacking-tools/nginx-config
    server {
        listen 0.0.0.0:8080;
        server_name localhost;

        root frontend/dist;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
